name: CI — Quality Gates

on:
  push:
    branches: [main, feat/*, feature/*]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ═══════════════════════════════════════════════
  # Gate 1 + 2: Syntax & Type Safety (tsc --noEmit)
  # ═══════════════════════════════════════════════
  gate-types:
    name: 'Gate 1+2: Syntax & Types'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node-pnpm

      - name: Backend type check
        run: cd backend && pnpm build

      - name: Frontend type check
        run: cd frontend && pnpm build

  # ═══════════════════════════════════════════════
  # Gate 3: Code Quality (ESLint + Prettier)
  # ═══════════════════════════════════════════════
  gate-lint:
    name: 'Gate 3: Lint & Format'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node-pnpm

      - name: ESLint
        run: pnpm lint

      - name: Prettier check
        run: pnpm format:check

  # ═══════════════════════════════════════════════
  # Gate 4: Security
  # ═══════════════════════════════════════════════
  gate-security:
    name: 'Gate 4: Security'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node-pnpm
        with:
          install-frontend: 'false'

      - name: Dependency audit
        run: cd backend && pnpm audit --audit-level=high
        continue-on-error: true

      - name: Check for hardcoded secrets
        run: |
          if grep -rE "(api_key|secret|password)\s*=\s*['\"][^'\"]+['\"]" backend/src/ frontend/src/ --include="*.ts" 2>/dev/null; then
            echo "::error::Hardcoded secrets detected!"
            exit 1
          fi
          echo "No hardcoded secrets found"

  # ═══════════════════════════════════════════════
  # Gate 5: Tests
  # ═══════════════════════════════════════════════
  gate-tests:
    name: 'Gate 5: Tests'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node-pnpm

      - name: Backend tests with coverage
        run: cd backend && pnpm test:coverage

      - name: Frontend tests with coverage
        run: cd frontend && pnpm test

      - name: Upload backend coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          files: backend/coverage/lcov.info
          flags: backend
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload frontend coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          files: frontend/coverage/lcov.info
          flags: frontend
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Coverage summary
        if: always()
        run: |
          echo "## Coverage Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Backend" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cd backend && npx vitest run --coverage 2>&1 | grep -A 30 "^---" | head -35 >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Frontend" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cd ../frontend && npx ng test --watch false 2>&1 | grep -A 30 "^---" | head -35 >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  # ═══════════════════════════════════════════════
  # Gate 8: Integration (smoke test)
  # Gates 6 (Performance) and 7 (Accessibility)
  # will be added when frontend dashboard lands
  # ═══════════════════════════════════════════════
  gate-integration:
    name: 'Gate 8: Integration'
    runs-on: ubuntu-latest
    needs: [gate-types, gate-lint, gate-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node-pnpm

      - name: Backend build
        run: cd backend && pnpm build

      - name: Frontend build
        run: cd frontend && pnpm build

      - name: Docker build validation
        run: cd backend && docker build -t ledger-backend:ci .

      - name: Smoke test /health
        run: |
          cd backend
          DATABASE_URL=fake MISTRAL_API_KEY=fake JWT_SECRET=fake pnpm start &
          SERVER_PID=$!

          # Wait for server to be ready (max 30s)
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/health > /dev/null 2>&1; then
              echo "Server ready after ${i}s"
              break
            fi
            sleep 1
          done

          # Smoke test
          RESPONSE=$(curl -sf http://localhost:3000/health)
          echo "Response: $RESPONSE"

          echo "$RESPONSE" | grep -q '"status":"ok"'
          echo "Smoke test passed"

          kill $SERVER_PID
